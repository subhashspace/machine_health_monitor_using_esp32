<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Health Monitor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.5/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap');

:root{
  --bg:#060a0f;
  --surf:#0d1520;
  --border:#1a2d45;
  --accent:#00e5ff;
  --warn:#ffb300;
  --crit:#ff1744;
  --good:#00e676;
  --hot:#ff6d00;
  --dim:#3a5068;
  --text:#c8dce8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  min-height:100vh;
}

header{
  padding:18px 30px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  color:var(--accent);
  font-size:28px;
  font-weight:800;
  letter-spacing:3px;
}

.status{
  font-family:'Share Tech Mono',monospace;
  font-size:13px;
}

main{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px;
}

.card-title{
  color:var(--dim);
  font-size:11px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.value{
  font-family:'Share Tech Mono',monospace;
  font-size:34px;
}

.unit{
  font-size:15px;
  color:var(--dim);
}

.good{
  color:var(--good);
}

.warn{
  color:var(--warn);
}

.crit{
  color:var(--crit);
}

.chart-card{
  grid-column:span 4;
  height:260px;
}

.alert-card{
  grid-column:span 4;
}

.alert-log{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.alert-item{
  padding:8px 10px;
  border-left:4px solid;
  background:#081018;
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
}

.alert-item.INFO{
  border-color:var(--accent);
  color:var(--accent);
}

.alert-item.WARNING{
  border-color:var(--warn);
  color:var(--warn);
}

.alert-item.CRITICAL{
  border-color:var(--crit);
  color:var(--crit);
}

.halt-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.94);
  z-index:99999;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  animation:blink 0.7s infinite;
}

.halt-title{
  font-size:52px;
  color:var(--crit);
  font-weight:800;
  letter-spacing:4px;
}

.halt-reason{
  margin-top:20px;
  font-size:24px;
  color:white;
  font-family:'Share Tech Mono',monospace;
}

@keyframes blink{
  50%{
    opacity:0.7;
  }
}

@media(max-width:900px){

  main{
    grid-template-columns:1fr;
  }

  .chart-card,
  .alert-card{
    grid-column:span 1;
  }
}

</style>
</head>

<body>

<div class="halt-overlay" id="haltOverlay">

  <div class="halt-title">
    SYSTEM HALTED
  </div>

  <div class="halt-reason" id="haltReason">
    UNKNOWN FAULT
  </div>

</div>

<header>

  <div class="title">
    MachineGuard
  </div>

  <div class="status" id="connStatus">
    CONNECTING...
  </div>

</header>

<main>

<div class="card">

  <div class="card-title">
    TEMPERATURE
  </div>

  <div class="value" id="tempVal">
    -- <span class="unit">°C</span>
  </div>

</div>

<div class="card">

  <div class="card-title">
    VIBRATION
  </div>

  <div class="value" id="vibVal">
    -- <span class="unit">/s</span>
  </div>

</div>

<div class="card">

  <div class="card-title">
    SHOCK
  </div>

  <div class="value" id="accelVal">
    -- <span class="unit">m/s²</span>
  </div>

</div>

<div class="card">

  <div class="card-title">
    HEALTH
  </div>

  <div class="value" id="healthVal">
    -- <span class="unit">%</span>
  </div>

</div>

<div class="card chart-card">
  <canvas id="trendChart"></canvas>
</div>

<div class="card alert-card">

  <div class="card-title">
    ALERT LOG
  </div>

  <div class="alert-log" id="alertLog">
  </div>

</div>

</main>

<script>

const BROKER = 'wss://broker.hivemq.com:8884/mqtt';

const TOPICS = {
  temp:'machine/temp',
  vib:'machine/vibcount',
  accel:'machine/accel',
  health:'machine/health',
  alert:'machine/alert',
  fault:'machine/fault_reason'
};

const state = {
  temp:0,
  vib:0,
  accel:0,
  health:100,
  halted:false
};

const ctx = document
  .getElementById('trendChart')
  .getContext('2d');

const chart = new Chart(ctx,{
  type:'line',

  data:{
    labels:[],

    datasets:[
      {
        label:'Temperature',
        data:[],
        borderColor:'#ff6d00',
        borderWidth:2,
        tension:0.4
      },

      {
        label:'Health',
        data:[],
        borderColor:'#00e5ff',
        borderWidth:2,
        tension:0.4
      }
    ]
  },

  options:{
    responsive:true,
    maintainAspectRatio:false
  }
});

const client = mqtt.connect(BROKER,{
  reconnectPeriod:2000
});

client.on('connect',()=>{

  document.getElementById('connStatus')
    .textContent = 'MQTT CONNECTED';

  Object.values(TOPICS).forEach(topic=>{
    client.subscribe(topic);
  });

  pushAlert(
    'INFO',
    'Dashboard connected'
  );
});

client.on('offline',()=>{

  document.getElementById('connStatus')
    .textContent = 'MQTT OFFLINE';
});

client.on('message',(topic,payload)=>{

  const msg = payload.toString();

  if(topic === TOPICS.temp){

    state.temp = parseFloat(msg);

    document.getElementById('tempVal').innerHTML =
      state.temp.toFixed(1) +
      ' <span class="unit">°C</span>';

    addChartValue(0,state.temp);
  }

  if(topic === TOPICS.vib){

    state.vib = parseInt(msg);

    document.getElementById('vibVal').innerHTML =
      state.vib +
      ' <span class="unit">/s</span>';
  }

  if(topic === TOPICS.accel){

    state.accel = parseFloat(msg);

    document.getElementById('accelVal').innerHTML =
      state.accel.toFixed(2) +
      ' <span class="unit">m/s²</span>';
  }

  if(topic === TOPICS.health){

    state.health = parseInt(msg);

    document.getElementById('healthVal').innerHTML =
      state.health +
      ' <span class="unit">%</span>';

    addChartValue(1,state.health);
  }

  if(topic === TOPICS.alert){

    if(msg === 'CRITICAL'){

      state.halted = true;

      document.getElementById('haltOverlay')
        .style.display = 'flex';

      pushAlert(
        'CRITICAL',
        'SYSTEM HALTED'
      );
    }

    else{

      state.halted = false;

      document.getElementById('haltOverlay')
        .style.display = 'none';
    }
  }

  if(topic === TOPICS.fault){

    if(msg.length > 0){

      document.getElementById('haltReason')
        .textContent = msg;

      pushAlert(
        'CRITICAL',
        msg
      );
    }
  }

  applyStates();
});

function applyStates(){

  setValueColor(
    'tempVal',
    state.temp >= 70
      ? 'crit'
      : state.temp >= 55
      ? 'warn'
      : 'good'
  );

  setValueColor(
    'vibVal',
    state.vib >= 20
      ? 'crit'
      : state.vib >= 10
      ? 'warn'
      : 'good'
  );

  setValueColor(
    'accelVal',
    state.accel >= 8
      ? 'crit'
      : state.accel >= 4
      ? 'warn'
      : 'good'
  );

  setValueColor(
    'healthVal',
    state.health <= 30
      ? 'crit'
      : state.health <= 60
      ? 'warn'
      : 'good'
  );
}

function setValueColor(id,cls){

  const el = document.getElementById(id);

  el.classList.remove(
    'good',
    'warn',
    'crit'
  );

  el.classList.add(cls);
}

function pushAlert(level,msg){

  const log = document.getElementById('alertLog');

  const div = document.createElement('div');

  div.className =
    'alert-item ' + level;

  div.textContent =
    '[' +
    new Date().toLocaleTimeString() +
    '] ' +
    msg;

  log.prepend(div);

  while(log.children.length > 25){

    log.removeChild(log.lastChild);
  }
}

function addChartValue(index,val){

  const now =
    new Date().toLocaleTimeString();

  if(chart.data.labels.length > 30){

    chart.data.labels.shift();

    chart.data.datasets.forEach(ds=>{
      ds.data.shift();
    });
  }

  if(index === 0){
    chart.data.labels.push(now);
  }

  chart.data.datasets[index]
    .data.push(val);

  chart.update();
}

</script>

</body>
</html>
